version: '3.8'
services:
  backend:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
    dns:
      - 8.8.8.8     # Google DNS
      - 1.1.1.1     # Cloudflare DNS
    networks:
      - cubixpay-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - cubixpay-network

volumes:
  redis_data:

networks:
  cubixpay-network:
    driver: bridge